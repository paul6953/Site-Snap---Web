<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>SiteSnap</title>
  <meta name="theme-color" content="#ffffff" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Home ──────────────────────────────────────────────────────────────── -->
  <div id="screen-home" class="screen">
    <header class="nav">
      <h1 class="nav-title">SiteSnap</h1>
      <div class="nav-right-group">
        <button id="mp-open-btn" class="nav-action-ghost">Manpower</button>
        <button id="import-btn" class="nav-action">Upload</button>
      </div>
    </header>
    <input type="file" id="import-input" accept="image/*,application/pdf" hidden />
    <div id="floorplan-list" class="list"></div>
    <div id="empty-state" class="empty-state" style="display:none">
      <p class="empty-icon">🗂</p>
      <p class="empty-title">No Floor Plans</p>
      <p class="empty-body">Upload a PDF or image to start documenting your site.</p>
    </div>
  </div>

  <!-- Floor plan ─────────────────────────────────────────────────────────── -->
  <div id="screen-floorplan" class="screen" style="display:none">
    <header class="nav">
      <button id="back-btn" class="nav-back">‹ Back</button>
      <h1 id="fp-title" class="nav-title-center">Floor Plan</h1>
      <button id="edit-btn" class="nav-action">Edit</button>
    </header>
    <div id="fp-banner" class="fp-banner" style="display:none"></div>
    <div id="fp-container" class="fp-root"></div>

    <!-- Colour picker bar (hidden in edit mode) -->
    <div id="color-bar" class="bottom-bar color-bar">
      <span class="color-bar-label">Colour</span>
      <div id="color-dots" class="color-dots">
        <button class="cdot active" data-color="#007AFF" style="background:#007AFF"></button>
        <button class="cdot" data-color="#FF3B30" style="background:#FF3B30"></button>
        <button class="cdot" data-color="#FF9500" style="background:#FF9500"></button>
        <button class="cdot" data-color="#34C759" style="background:#34C759"></button>
        <button class="cdot" data-color="#AF52DE" style="background:#AF52DE"></button>
        <button class="cdot" data-color="#5AC8FA" style="background:#5AC8FA"></button>
      </div>
      <button id="export-btn" class="text-btn">Export PDF</button>
    </div>

    <!-- Edit toolbar (shown in edit mode) -->
    <div id="edit-toolbar" class="bottom-bar edit-bar" style="display:none">
      <span class="edit-hint">Drag to move · Tap to edit</span>
      <button id="add-pin-btn" class="text-btn">+ Add Pin</button>
    </div>

    <p class="hint">Tap the floor plan to photograph and pin that location.</p>
  </div>

  <!-- Post-photo label sheet ─────────────────────────────────────────────── -->
  <div id="label-sheet" class="sheet-overlay" style="display:none">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <p class="sheet-title">Label this pin</p>
      <p class="sheet-sub">All fields are optional</p>
      <input id="ls-name"    class="field" type="text"  placeholder="Pin name (e.g. North stairwell)" maxlength="60" />
      <textarea id="ls-note" class="field field-area"   placeholder="Description…" rows="2"></textarea>
      <input id="ls-caption" class="field" type="text"  placeholder="Photo caption" maxlength="120" />
      <div class="sheet-row">
        <button id="ls-skip" class="sheet-btn secondary">Skip</button>
        <button id="ls-save" class="sheet-btn primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Pin edit sheet (edit mode) ─────────────────────────────────────────── -->
  <div id="pin-edit-sheet" class="sheet-overlay" style="display:none">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <p id="pes-heading" class="sheet-title">Edit Pin</p>
      <input id="pes-name" class="field" type="text" placeholder="Pin name" maxlength="60" />
      <textarea id="pes-note" class="field field-area" placeholder="Description…" rows="2"></textarea>
      <p class="field-label">Colour</p>
      <div id="pes-color-dots" class="color-dots">
        <button class="cdot" data-color="#007AFF" style="background:#007AFF"></button>
        <button class="cdot" data-color="#FF3B30" style="background:#FF3B30"></button>
        <button class="cdot" data-color="#FF9500" style="background:#FF9500"></button>
        <button class="cdot" data-color="#34C759" style="background:#34C759"></button>
        <button class="cdot" data-color="#AF52DE" style="background:#AF52DE"></button>
        <button class="cdot" data-color="#5AC8FA" style="background:#5AC8FA"></button>
      </div>
      <div class="sheet-row">
        <button id="pes-delete" class="sheet-btn danger">Delete Pin</button>
        <button id="pes-save"   class="sheet-btn primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Photo viewer ───────────────────────────────────────────────────────── -->
  <div id="photo-viewer" class="viewer" style="display:none">
    <header class="viewer-header">
      <button id="pv-close" class="pv-close">Done</button>
      <div class="viewer-meta">
        <p id="pv-pin-name" class="pv-pin-name"></p>
        <p id="pv-position" class="pv-pos"></p>
      </div>
      <button id="pv-add-photo" class="pv-add">+ Revisit</button>
    </header>
    <div class="viewer-body">
      <button id="pv-prev" class="pv-nav">‹</button>
      <div class="pv-area">
        <img id="pv-image" alt="" />
        <p id="pv-caption" class="pv-date"></p>
        <input id="pv-photo-caption" class="pv-caption-field" type="text" placeholder="Add a caption…" maxlength="120" />
      </div>
      <button id="pv-next" class="pv-nav">›</button>
    </div>
    <div class="viewer-footer">
      <input id="pv-note" class="pv-note" placeholder="Pin note…" />
      <button id="pv-delete" class="pv-delete">Delete</button>
    </div>
  </div>

  <!-- Manpower ───────────────────────────────────────────────────────────── -->
  <div id="screen-manpower" class="screen" style="display:none">

    <!-- Sub: Home -->
    <div id="mp-sub-home" class="mp-sub">
      <header class="nav">
        <button id="mp-back-home" class="nav-back">‹ Back</button>
        <h1 class="nav-title-center">Manpower</h1>
        <div style="width:60px"></div>
      </header>
      <div class="mp-home-body">
        <p class="mp-date-label" id="mp-date-label"></p>
        <p class="mp-status-label" id="mp-home-status"></p>
        <button class="mp-btn-primary" id="mp-start-btn">Record Today's Count</button>
        <button class="mp-btn-secondary" id="mp-view-reports-btn">View Reports</button>
      </div>
    </div>

    <!-- Sub: Trade list -->
    <div id="mp-sub-trades" class="mp-sub" style="display:none">
      <header class="nav">
        <button id="mp-trades-back" class="nav-back">‹ Back</button>
        <h1 class="nav-title-center" id="mp-trades-subtitle"></h1>
        <button id="mp-save-btn" class="nav-action">Save</button>
      </header>
      <div class="mp-list" id="mp-trades-list"></div>
    </div>

    <!-- Sub: Zone list -->
    <div id="mp-sub-zones" class="mp-sub" style="display:none">
      <header class="nav">
        <button id="mp-zones-back" class="nav-back">‹ Back</button>
        <h1 class="nav-title-center" id="mp-zones-title"></h1>
        <div style="width:60px"></div>
      </header>
      <div class="mp-list" id="mp-zones-list"></div>
    </div>

    <!-- Sub: Keypad -->
    <div id="mp-sub-keypad" class="mp-sub" style="display:none">
      <header class="nav">
        <button id="mp-keypad-back" class="nav-back">‹ Back</button>
        <h1 class="nav-title-center" id="mp-keypad-subtitle"></h1>
        <div style="width:60px"></div>
      </header>
      <div class="mp-keypad-body">
        <div class="mp-keypad-display" id="mp-keypad-display">0</div>
        <div class="mp-keypad-grid">
          <button class="mp-key" data-k="7">7</button>
          <button class="mp-key" data-k="8">8</button>
          <button class="mp-key" data-k="9">9</button>
          <button class="mp-key" data-k="4">4</button>
          <button class="mp-key" data-k="5">5</button>
          <button class="mp-key" data-k="6">6</button>
          <button class="mp-key" data-k="1">1</button>
          <button class="mp-key" data-k="2">2</button>
          <button class="mp-key" data-k="3">3</button>
          <button class="mp-key" data-k="⌫">⌫</button>
          <button class="mp-key" data-k="0">0</button>
          <button class="mp-key mp-key-confirm" data-k="✓">✓</button>
        </div>
      </div>
    </div>

    <!-- Sub: Reports -->
    <div id="mp-sub-reports" class="mp-sub" style="display:none">
      <header class="nav">
        <button id="mp-reports-back" class="nav-back">‹ Back</button>
        <h1 class="nav-title-center">Reports</h1>
        <div style="width:60px"></div>
      </header>
      <div class="mp-reports-scroll" id="mp-reports-body"></div>
    </div>

  </div>

  <!-- Loading ────────────────────────────────────────────────────────────── -->
  <div id="loading-overlay" class="loading" style="display:none">
    <div class="spinner"></div>
    <p id="loading-text">Working…</p>
  </div>

  <script src="js/vendor/jspdf.umd.min.js"></script>
  <script src="js/vendor/pdf.min.js"></script>
  <script src="js/pdfimport.js"></script>
  <script src="js/db.js"></script>
  <script src="js/camera.js"></script>
  <script src="js/floorplan.js"></script>
  <script src="js/export.js"></script>
  <script src="js/manpower.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
