<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>SiteSnap</title>
  <meta name="theme-color" content="#1e3a5f" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Home ── -->
  <div id="screen-home" class="screen">
    <header class="topbar">
      <h1>SiteSnap</h1>
      <button id="import-btn" class="btn btn-primary">+ Upload Floor Plan</button>
    </header>
    <input type="file" id="import-input" accept="image/*,application/pdf" hidden />
    <div id="floorplan-list" class="list"></div>
    <p id="empty-state" class="empty-state" style="display:none">
      No floor plans yet. Upload a PDF or image to get started.
    </p>
  </div>

  <!-- ── Floor plan ── -->
  <div id="screen-floorplan" class="screen" style="display:none">
    <header class="topbar">
      <button id="back-btn" class="btn-icon" aria-label="Back">&larr;</button>
      <h1 id="fp-title">Floor Plan</h1>
      <button id="export-btn" class="btn btn-primary btn-sm">Export PDF</button>
    </header>
    <div id="fp-container" class="fp-root"></div>
    <p class="hint">Tap anywhere on the floor plan to take a timestamped photo at that location. Tap a numbered dot to view its photos.</p>
  </div>

  <!-- ── Photo viewer ── -->
  <div id="photo-viewer" class="modal" style="display:none">
    <div class="modal-header">
      <button id="pv-close" class="btn-icon" aria-label="Close">&times;</button>
      <input id="pv-note" class="pv-note-input" placeholder="Note for this location…" />
      <button id="pv-add-photo" class="btn btn-secondary">+ Revisit</button>
    </div>
    <div class="modal-body">
      <button id="pv-prev" class="pv-nav" aria-label="Previous">&lsaquo;</button>
      <div class="pv-photo-area">
        <img id="pv-image" alt="Site photo" />
        <p id="pv-caption" class="pv-caption"></p>
      </div>
      <button id="pv-next" class="pv-nav" aria-label="Next">&rsaquo;</button>
    </div>
    <div class="modal-footer">
      <span id="pv-position" class="pv-position"></span>
      <button id="pv-delete" class="btn btn-danger">Delete Photo</button>
    </div>
  </div>

  <!-- ── Loading overlay ── -->
  <div id="loading-overlay" class="loading-overlay" style="display:none">
    <div class="spinner"></div>
    <p id="loading-text">Working…</p>
  </div>

  <script src="js/vendor/jspdf.umd.min.js"></script>
  <script src="js/vendor/pdf.min.js"></script>
  <script src="js/pdfimport.js"></script>
  <script src="js/db.js"></script>
  <script src="js/camera.js"></script>
  <script src="js/floorplan.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
